server:
  port: 8088 # Khách hàng (Postman) chỉ cần gọi vào cổng này

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        # Chỉ đường cho Order Service
        - id: order-service
          uri: lb://order-service # Gọi sang danh bạ Eureka để xin IP
          predicates:
            - Path=/orders/**

        # Chỉ đường cho Product Service
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/products/**, /favorites/**

        # Chỉ đường cho User Service
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**, /follows/**, /payment/**

        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/chat/**

        - id: chat-websocket
          uri: lb://chat-service
          predicates:
            - Path=/ws/chat/**

        - id: media-service
          uri: lb://media-service
          predicates:
            - Path=/media/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notifications/**

        - id: notification-websocket
          uri: lb://notification-service
          predicates:
            - Path=/ws/notifications/**

        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/reviews/**

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/payments/**

springdoc:
  swagger-ui:
    urls:
      - name: User Service
        url: /USER-SERVICE/v3/api-docs
      - name: Order Service
        url: /ORDER-SERVICE/v3/api-docs
      - name: Product Service
        url: /PRODUCT-SERVICE/v3/api-docs
      - name: Chat Service
        url: /CHAT-SERVICE/v3/api-docs
      - name: Media Service
        url: /MEDIA-SERVICE/v3/api-docs
      - name: Notification Service
        url: /NOTIFICATION-SERVICE/v3/api-docs
      - name: Review Service
        url: /REVIEW-SERVICE/v3/api-docs
      - name: Payment Service
        url: /PAYMENT-SERVICE/v3/api-docs
  api-docs:
    path: /v3/api-docs

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

